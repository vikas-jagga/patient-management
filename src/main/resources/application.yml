spring:
  application:
    name: patient-management

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# No passwords or environment-specific DB settings here.
# Profile / runtime          | How DB is configured
# ---------------------------|--------------------------------------------------
# local                      | application-local.yml (local Docker Postgres)
# gcp                        | application-gcp.yml + DB_PASSWORD env var
# Kubernetes (default)       | ConfigMap + Secret env vars (see k8s/)
