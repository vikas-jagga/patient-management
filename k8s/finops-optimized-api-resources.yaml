# Apply after observing metrics:
#   kubectl top pods -n patient-management

apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-api-deployment
  namespace: patient-management
spec:
  template:
    spec:
      containers:
        - name: patient-api
          resources:
            requests:
              cpu: 75m
              memory: 192Mi
            limits:
              cpu: 200m
              memory: 384Mi
